name: flyer_chat
description: A modern chat application with Flutter and Firebase.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.7.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.6.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^16.3.0
  path_provider: ^2.1.1
  image: ^4.1.3
  flutter_webrtc: ^0.9.47
  permission_handler: ^11.1.0
  uuid: ^4.2.2
  intl: ^0.19.0
  flutter_sound: ^9.2.13
  google_fonts: ^6.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  cached_network_image: ^3.3.1
  emoji_picker_flutter: ^1.6.3
  video_player: ^2.8.2
  chewie: ^1.7.5
  flutter_chat_bubble: ^2.0.2
  timeago: ^3.6.1
  flutter_slidable: ^3.0.1
  connectivity_plus: ^5.0.2
  flutter_keyboard_visibility: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
